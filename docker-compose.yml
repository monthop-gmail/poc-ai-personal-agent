services:
  agent:
    build: .
    container_name: ai-personal-agent
    stdin_open: true    # เปิด stdin สำหรับ interactive mode
    tty: true           # เปิด terminal
    volumes:
      # OAuth — mount credentials ไว้ที่ tmp ให้ entrypoint คัดลอกไปใช้
      - ~/.claude/.credentials.json:/tmp/host-claude-credentials/.credentials.json:ro
      # ข้อมูล agent — แยกจาก host ไม่ปนกัน
      - agent-data:/home/node/.claude
      # ข้อมูลถาวร — ไม่หายเมื่อ restart
      - ./notes:/workspace/notes
      - ./projects:/workspace/projects
      - ./research:/workspace/research
      - ./scripts:/workspace/scripts
      # ไฟล์ชั่วคราว — ไม่ mount ให้หายไปเมื่อ restart
      # - ./downloads:/workspace/downloads
    # ไม่ให้สิทธิ์เข้าถึง host โดยตรง
    security_opt:
      - no-new-privileges:true

volumes:
  agent-data:   # ข้อมูล .claude ของ container (memory, history, settings)
